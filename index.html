<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>AB.SHAH | QUANT AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=JetBrains+Mono:wght@400;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #050505;
            --bg-card: #0e1117;
            --border-color: #21262d;
            --text-primary: #ffffff;
            --text-muted: #8b949e;
            --buy-color: #00e676;
            --sell-color: #ff1744;
            --warn-color: #ffb300;
            --accent: #2962ff;
            --circle-bg: #161b22;
        }

        [data-theme="light"] {
            --bg-main: #f0f2f5;
            --bg-card: #ffffff;
            --border-color: #d0d7de;
            --text-primary: #24292f;
            --text-muted: #57606a;
            --buy-color: #059669;
            --sell-color: #e11d48;
            --warn-color: #d97706;
            --accent: #0969da;
            --circle-bg: #f6f8fa;
        }

        * { box-sizing: border-box; }
        
        body { 
            background: var(--bg-main); color: var(--text-primary); font-family: 'Inter', sans-serif; 
            display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 15px; 
            transition: background 0.4s ease, color 0.4s ease;
        }
        
        .app-container { 
            background: var(--bg-card); border: 1px solid var(--border-color); padding: 25px; 
            border-radius: 24px; width: 100%; max-width: 440px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); 
            position: relative; overflow: hidden; transition: all 0.4s ease; display: flex; flex-direction: column;
        }

        /* TOP UTILITY BAR */
        .utility-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .util-selects { display: flex; gap: 8px; flex-wrap: wrap; }
        .u-sel { background: var(--circle-bg); border: 1px solid var(--border-color); color: var(--text-muted); border-radius: 6px; padding: 6px 10px; font-size: 11px; font-family: 'JetBrains Mono'; font-weight: 700; outline: none; cursor: pointer; transition: 0.3s; }
        .u-sel:focus, .u-sel:hover { border-color: var(--accent); color: var(--text-primary); }
        .theme-btn { background: var(--circle-bg); border: 1px solid var(--border-color); color: var(--text-muted); border-radius: 6px; padding: 6px 12px; cursor: pointer; font-size: 14px; transition: 0.3s; }
        .theme-btn:hover { border-color: var(--accent); color: var(--text-primary); }

        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px;}
        .header-title { font-size: 20px; font-weight: 900; letter-spacing: 1px; }
        .ping-badge { font-family: 'JetBrains Mono'; font-size: 11px; color: var(--buy-color); background: rgba(0, 230, 118, 0.1); padding: 5px 10px; border-radius: 6px; border: 1px solid rgba(0, 230, 118, 0.2); font-weight: 800; transition: 0.3s;}

        /* Controls */
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; }
        select.main-sel { 
            background: var(--circle-bg); border: 1px solid var(--border-color); color: var(--text-primary); 
            padding: 14px; border-radius: 10px; font-family: 'JetBrains Mono'; font-size: 12px; font-weight: 700; outline: none; transition: 0.3s;
        }
        select.main-sel:focus { border-color: var(--accent); }

        /* CIRCULAR INDICATOR UI */
        .indicator-wrapper { display: flex; flex-direction: column; align-items: center; justify-content: center; margin-bottom: 30px; min-height: 220px;}
        .status-text { font-family: 'JetBrains Mono'; font-size: 12px; font-weight: 800; color: var(--text-muted); margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; text-align: center; height: 16px; transition: 0.3s;}
        
        .circle-outer {
            width: 180px; height: 180px; border-radius: 50%; display: flex; justify-content: center; align-items: center;
            position: relative; transition: all 0.4s ease; background: var(--circle-bg); border: 2px solid var(--border-color);
        }
        
        .circle-inner {
            width: 155px; height: 155px; border-radius: 50%; display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: var(--bg-card); z-index: 2; transition: all 0.4s ease;
        }

        /* SVG Staircase Icons */
        .signal-icon { width: 45px; height: 45px; margin-bottom: 8px; display: none; }
        .signal-text { font-size: 18px; font-weight: 900; letter-spacing: 1px; display: none; text-align: center; line-height: 1.2;}

        /* Scanning Animation */
        .scanner-ring {
            position: absolute; width: 100%; height: 100%; border-radius: 50%;
            border: 4px solid transparent; border-top-color: var(--accent); border-right-color: var(--accent);
            animation: spin 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* PROGRESS BARS with Gradients */
        .metrics-container { margin-bottom: 25px; display: none; }
        .metric-row { margin-bottom: 14px; }
        .metric-labels { display: flex; justify-content: space-between; font-family: 'JetBrains Mono'; font-size: 11px; font-weight: 800; color: var(--text-primary); margin-bottom: 6px; text-transform: uppercase;}
        .progress-bg { width: 100%; height: 10px; background: var(--circle-bg); border-radius: 5px; overflow: hidden; border: 1px solid var(--border-color); position: relative;}
        .progress-fill { height: 100%; width: 0%; border-radius: 5px; transition: width 1s cubic-bezier(0.25, 1, 0.5, 1); }
        .fill-buy { background: linear-gradient(90deg, #00b09b, #96c93d); }
        .fill-sell { background: linear-gradient(90deg, #cb2d3e, #ef473a); }

        /* TIMER AREA */
        .timer-box { background: var(--circle-bg); border: 1px solid var(--border-color); border-radius: 14px; padding: 20px; text-align: center; margin-bottom: 15px;}
        .timer-msg { font-size: 12px; color: var(--text-muted); font-weight: 800; margin-bottom: 5px; text-transform: uppercase;}
        .timer-val { font-family: 'JetBrains Mono'; font-size: 32px; font-weight: 900; color: var(--text-primary); }

        /* 7-DAY BACKTESTER */
        .tester-btn { width: 100%; padding: 12px; background: transparent; color: var(--text-muted); border: 1px dashed var(--border-color); border-radius: 8px; font-weight: 700; font-size: 11px; cursor: pointer; margin-bottom: 15px; font-family: 'JetBrains Mono'; transition: 0.3s;}
        .tester-btn:hover { border-color: var(--text-primary); color: var(--text-primary); }
        .tester-panel { display: none; background: var(--circle-bg); border: 1px solid var(--accent); padding: 15px; border-radius: 12px; margin-bottom: 15px; text-align: center; }
        .test-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .test-box { background: var(--bg-card); padding: 10px; border-radius: 6px; font-family: 'JetBrains Mono'; }
        .test-val { font-size: 16px; font-weight: 900; margin-top: 5px; }

        /* AUTH & BUTTONS */
        .auth-screen { text-align: center; padding: 20px 10px; }
        .auth-inp { width: 100%; padding: 16px; background: var(--circle-bg); border: 1px solid var(--border-color); color: var(--text-primary); border-radius: 12px; font-family: 'JetBrains Mono'; margin-bottom: 20px; outline: none; transition: 0.3s;}
        .auth-inp:focus { border-color: var(--accent); }
        .primary-btn { width: 100%; padding: 18px; background: var(--accent); color: #fff; border: none; border-radius: 12px; font-weight: 900; font-size: 15px; cursor: pointer; transition: 0.3s; letter-spacing: 1px;}
        .primary-btn:hover { background: #1c4ed8; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(41, 98, 255, 0.3);}

        /* COPYRIGHT FOOTER */
        .copyright { text-align: center; margin-top: auto; font-size: 10px; color: var(--text-muted); font-family: 'JetBrains Mono'; font-weight: 600; letter-spacing: 0.5px; border-top: 1px solid var(--border-color); padding-top: 15px; }
    </style>
</head>

        let currentLang = "EN";

        function changeLanguage() {
            currentLang = document.getElementById('langSel').value;
            const t = translations[currentLang];
            
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if(t[key]) el.innerText = t[key];
            });
            document.querySelectorAll('[data-i18n-ph]').forEach(el => {
                const key = el.getAttribute('data-i18n-ph');
                if(t[key]) el.placeholder = t[key];
            });

            // Handle RTL for Arabic
            if(currentLang === "AR") {
                document.body.style.direction = "rtl";
            } else {
                document.body.style.direction = "ltr";
            }
        }

        // --- 2. SERVER PING ---
        function changeServer() {
            let server = document.getElementById('serverSel').value;
            let badge = document.getElementById('pingBadge');
            const pings = { "GLOBAL": "2ms", "US": "112ms", "UK": "78ms", "BR": "145ms", "SG": "45ms" };
            badge.style.color = "var(--warn-color)";
            badge.innerText = "ROUTING...";
            setTimeout(() => {
                let pingVal = pings[server] || "5ms";
                badge.innerText = `PING: ${pingVal}`;
                badge.style.color = parseInt(pingVal) > 100 ? "var(--warn-color)" : "var(--buy-color)";
            }, 600);
        }

        // --- 3. THEME TOGGLE ---
        function toggleTheme() {
            let body = document.body;
            let btn = document.getElementById('themeBtn');
            if(body.getAttribute('data-theme') === 'light') {
                body.removeAttribute('data-theme');
                btn.innerText = '☀️'; 
            } else {
                body.setAttribute('data-theme', 'light');
                btn.innerText = '🌙'; 
            }
        }

        // --- 4. APP LOGIC ---
        let countdownInterval = null;
        let scanTimeout = null;
        let lastSignal = "";
        let streakCount = 0;

        function login() {
            let email = document.getElementById('email').value;
            if(email.length > 3) {
                document.getElementById('loginBox').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                startAutoLoop();
            } else { alert("Invalid License Key"); }
        }

        // --- 7-DAY BACKTESTER ---
        function runRealBacktest() {
            let panel = document.getElementById('testerPanel');
            panel.style.display = 'block';
            document.getElementById('tTotal').innerText = "CALC...";
            
            setTimeout(() => {
                let winRateNum = (74.8 + Math.random() * 4.2); // 74-79% Realistic Accuracy
                let totalTrades = 1250 + Math.floor(Math.random() * 300); // realistic 7 day scalping trades
                let wins = Math.floor(totalTrades * (winRateNum / 100));
                
                document.getElementById('tTotal').innerText = totalTrades;
                document.getElementById('tWins').innerText = wins;
                document.getElementById('tRate').innerText = winRateNum.toFixed(1) + "%";
            }, 1000);
        }

        async function fetchQuantSignal(pair) {
            const now = Date.now();
            const seed = pair.length * 10;
            const momentum = Math.sin((now / 20000) + seed) + Math.cos((now / 15000) + seed); 
            
            let actionRaw, color, iconId, strength, prob, msg;

            if (momentum > 0.6) {
                actionRaw = "act_buy"; color = "var(--buy-color)"; iconId = "sigIconBuy";
                strength = (88 + Math.random() * 8).toFixed(1);
                prob = (75 + Math.random() * 10).toFixed(1); // Realistic high probability
                msg = "TREND UPTICK CONFIRMED";
            } 
            else if (momentum < -0.6) {
                actionRaw = "act_sell"; color = "var(--sell-color)"; iconId = "sigIconSell";
                strength = (88 + Math.random() * 8).toFixed(1);
                prob = (75 + Math.random() * 10).toFixed(1);
                msg = "TREND DOWNTICK CONFIRMED";
            } 
            else {
                return { actionRaw: "act_wait", color: "var(--warn-color)", iconId: "sigIconWait", strength: "45.0", prob: "0.0", msg: "CONSOLIDATION - HOLD" };
            }

            if (actionRaw === lastSignal) { streakCount++; } else { streakCount = 1; lastSignal = actionRaw; }
            if (streakCount > 3) {
                streakCount = 0; 
                return { actionRaw: "act_wait", color: "var(--warn-color)", iconId: "sigIconWait", strength: "30.0", prob: "0.0", msg: "OVEREXTENDED - AVOID TRAP" };
            }

            return { actionRaw, color, iconId, strength, prob, msg };
        }

        function startAutoLoop() {
            clearInterval(countdownInterval);
            clearTimeout(scanTimeout);

            let pair = document.getElementById('pair').value;

            document.getElementById('statusText').innerText = translations[currentLang].scanning + ` ${pair}`;
            document.getElementById('statusText').style.color = "var(--text-muted)";
            
            document.getElementById('scannerRing').style.display = "block";
            document.getElementById('circleOuter').style.borderColor = "var(--border-color)";
            document.getElementById('circleOuter').style.boxShadow = "none";
            document.getElementById('circleInner').style.background = "var(--bg-card)";
            
            // Hide all SVG icons
            document.getElementById('sigIconBuy').style.display = "none";
            document.getElementById('sigIconSell').style.display = "none";
            document.getElementById('sigIconWait').style.display = "none";

            document.getElementById('sigText').style.display = "none";
            document.getElementById('metricsBox').style.display = "none";
            
            document.getElementById('timerMsg').innerText = translations[currentLang].scanning;
            document.getElementById('timerText').innerText = "--:--";
            document.getElementById('timerText').style.color = "var(--text-primary)";

            scanTimeout = setTimeout(async () => {
                let data = await fetchQuantSignal(pair);
                
                document.getElementById('statusText').innerText = data.msg;
                document.getElementById('statusText').style.color = data.color;

                document.getElementById('scannerRing').style.display = "none";
                document.getElementById('circleOuter').style.borderColor = data.color;
                document.getElementById('circleOuter').style.boxShadow = `0 0 40px ${data.color}50`;
                document.getElementById('circleInner').style.background = `radial-gradient(circle, ${data.color}25 0%, var(--bg-card) 90%)`;

                // Show correct SVG staircase icon
                let iconEl = document.getElementById(data.iconId);
                iconEl.style.color = data.color;
                iconEl.style.display = "block";
                
                document.getElementById('sigText').innerText = translations[currentLang][data.actionRaw];
                document.getElementById('sigText').style.color = data.color;
                document.getElementById('sigText').style.display = "block";

                document.getElementById('metricsBox').style.display = "block";
                
                document.getElementById('strengthVal').innerText = data.strength + "%";
                document.getElementById('strengthVal').style.color = data.color;
                
                setTimeout(() => {
                    let sFill = document.getElementById('strengthFill');
                    sFill.style.width = data.strength + "%";
                    sFill.className = "progress-fill " + (data.actionRaw === 'act_buy' ? 'fill-buy' : (data.actionRaw === 'act_sell' ? 'fill-sell' : ''));
                    if(data.actionRaw === 'act_wait') sFill.style.background = "var(--warn-color)";
                    
                    document.getElementById('probVal').innerText = data.prob + "%";
                    document.getElementById('probVal').style.color = data.color;
                    let pFill = document.getElementById('probFill');
                    pFill.style.width = data.prob + "%";
                    pFill.className = "progress-fill " + (data.actionRaw === 'act_buy' ? 'fill-buy' : (data.actionRaw === 'act_sell' ? 'fill-sell' : ''));
                    if(data.actionRaw === 'act_wait') pFill.style.background = "var(--warn-color)";
                }, 50);

                startTradeTimer(data.color);
            }, 1800);
        }

        function startTradeTimer(color) {
            document.getElementById('timerMsg').innerText = translations[currentLang].wait_signal;
            document.getElementById('timerText').style.color = color;
            
            let totalSeconds = parseInt(document.getElementById('timeframe').value);
            let timeLeft = totalSeconds;

            countdownInterval = setInterval(() => {
                timeLeft--;
                let m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
                let s = (timeLeft % 60).toString().padStart(2, '0');
                document.getElementById('timerText').innerText = `${m}:${s}`;
                
                if(timeLeft <= 0) {
                    clearInterval(countdownInterval);
                    startAutoLoop();
                }
            }, 1000);
        }

        changeLanguage();
    </script>
