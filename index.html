<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AB.SHAH PRO | HFT TERMINAL</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg-main: #04070b; --bg-card: #0a0f16; --border-color: #1a2332; --text-primary: #f3f4f6; --text-muted: #64748b; --buy-color: #10b981; --sell-color: #ef4444; --accent: #3b82f6; }
        body { background: var(--bg-main); color: var(--text-primary); font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .terminal-box { background: var(--bg-card); border: 1px solid var(--border-color); padding: 30px; border-radius: 12px; width: 500px; box-shadow: 0 20px 40px rgba(0,0,0,0.9); }
        .taveed-container { position: relative; width: 100%; height: 120px; border-radius: 8px; overflow: hidden; margin-bottom: 20px; border: 1px solid var(--border-color); display: none; }
        .taveed-img { width: 100%; height: 100%; object-fit: cover; opacity: 0.4; }
        .taveed-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-family: 'JetBrains Mono', monospace; font-size: 30px; font-weight: 800; color: #fff; text-shadow: 0 0 20px var(--accent); letter-spacing: 5px; width: 100%; text-align: center; }
        .header-area { text-align: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid var(--border-color); }
        h1 { margin: 0 0 5px 0; font-size: 24px; font-weight: 900; letter-spacing: 2px; }
        .badge { background: rgba(59, 130, 246, 0.1); color: var(--accent); padding: 5px 12px; border-radius: 4px; font-size: 11px; font-family: 'JetBrains Mono'; border: 1px solid rgba(59, 130, 246, 0.3); display: inline-block; font-weight: 700;}
        .price-badge { background: rgba(16, 185, 129, 0.1); color: var(--buy-color); padding: 8px 15px; border-radius: 6px; font-size: 14px; font-family: 'JetBrains Mono'; border: 1px solid rgba(16, 185, 129, 0.3); display: block; font-weight: 900; margin-top: 15px; text-align: center;}
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        select, input { padding: 12px; background: var(--bg-main); border: 1px solid var(--border-color); color: var(--text-primary); border-radius: 6px; font-family: 'JetBrains Mono', monospace; outline: none; width: 100%; font-size: 13px; font-weight: 600; }
        .primary-btn { width: 100%; padding: 14px; background: var(--accent); color: #fff; border: none; border-radius: 6px; font-weight: 900; font-size: 14px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; margin-top: 10px;}
        .timer-display { font-family: 'JetBrains Mono', monospace; font-size: 50px; font-weight: 800; text-align: center; margin: 15px 0; letter-spacing: -2px; }
        .ribbon-container { width: 100%; height: 6px; background: var(--bg-main); border-radius: 3px; overflow: hidden; margin-bottom: 20px; }
        .ribbon-scan { width: 25%; height: 100%; background: var(--accent); position: relative; animation: scanHFT 0.6s ease-in-out infinite alternate; display: none; }
        @keyframes scanHFT { 0% { left: -10%; } 100% { left: 85%; } }
        .ribbon-timer { height: 100%; width: 100%; transition: width 1s linear; display: none; }
        .signal-box { background: var(--bg-main); border: 1px solid var(--border-color); padding: 25px; border-radius: 8px; text-align: center; display: none; transition: 0.3s; }
        .action { font-size: 34px; font-weight: 900; margin: 10px 0; }
        .top-strats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; text-align: left; }
        .strat-item { display: flex; justify-content: space-between; align-items: center; background: var(--bg-card); padding: 10px; border-radius: 4px; border-left: 3px solid transparent; font-size: 11px; }
        .strat-name { color: var(--text-muted); font-weight: 700; font-family: 'JetBrains Mono'; }
        .strat-val { font-family: 'JetBrains Mono'; font-weight: 800; }
    </style>
</head>
<body>

    <div id="loginBox" class="terminal-box">
        <div class="header-area" style="border:none;">
            <h1>AB.SHAH PRO HFT</h1>
            <div class="badge">SECURE CLOUD NODE: VERCEL</div>
        </div>
        <input type="email" id="email" placeholder="Enter Authentication Key">
        <button class="primary-btn" onclick="login()">INITIALIZE ENGINE</button>
    </div>

    <div id="dashboard" class="terminal-box" style="display: none;">
        <div class="taveed-container" id="taveedContainer">
            <img id="taveedImg" class="taveed-img" src="">
            <div class="taveed-text">AB.SHAH HFT</div>
        </div>
        
        <div class="header-area">
            <div class="badge">PING: <span id="lat">1ms</span> | ENGINE: HYBRID HFT v2.0</div>
            <div class="price-badge" id="livePriceBadge">LIVE PRICE: $--</div>
        </div>

        <div class="controls">
            <select id="pair" onchange="updateMarketPrice()">
                <optgroup label="Real Crypto Markets">
                    <option value="BITCOIN">BITCOIN (BTC/USDT)</option>
                    <option value="ETHEREUM">ETHEREUM (ETH/USDT)</option>
                    <option value="GOLD">GOLD (PAXG/USDT)</option>
                </optgroup>
                <optgroup label="OTC Markets (Synced)">
                    <option value="EUR/USD (OTC)">EUR/USD (OTC)</option>
                    <option value="GBP/USD (OTC)">GBP/USD (OTC)</option>
                    <option value="USD/JPY (OTC)">USD/JPY (OTC)</option>
                    <option value="AUD/CAD (OTC)">AUD/CAD (OTC)</option>
                    <option value="NZD/USD (OTC)">NZD/USD (OTC)</option>
                </optgroup>
            </select>
            <select id="timeframe">
                <option value="5">S5 (5 Seconds)</option>
                <option value="15">S15 (15 Seconds)</option>
                <option value="60">M1 (1 Minute)</option>
                <option value="300">M5 (5 Minutes)</option>
            </select>
        </div>

        <div class="timer-display" id="timerText">00:00</div>
        
        <div class="ribbon-container">
            <div id="ribbonScan" class="ribbon-scan"></div>
            <div id="ribbonTimer" class="ribbon-timer"></div>
        </div>

        <button id="scanBtn" class="primary-btn" onclick="startAutoLoop()">ANALYZE MARKET</button>

        <div id="signalOutput" class="signal-box" style="margin-top:20px;">
            <div style="color:var(--text-muted); font-size:10px; font-family:'JetBrains Mono';" id="sigMsg">AWAITING TRIGGER...</div>
            <div class="action" id="sigAction">--</div>
            <div id="winProbBox" style="font-size:12px; margin-bottom:15px; font-family:'JetBrains Mono';">PROBABILITY: <span id="winProb">--</span></div>
            <div class="top-strats" id="topStrats"></div>
        </div>
    </div>

    <script>
        const SERVER_URL = window.location.origin; 
        let countdownInterval = null;
        let priceInterval = null;

        function login() {
            let email = document.getElementById('email').value;
            fetch(`${SERVER_URL}/login`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email: email })
            }).then(res => res.json()).then(data => {
                if(data.success) {
                    document.getElementById('loginBox').style.display = 'none';
                    document.getElementById('dashboard').style.display = 'block';
                    document.getElementById('taveedImg').src = data.taveedUrl;
                    document.getElementById('taveedContainer').style.display = 'block';
                    updateMarketPrice(); // Start price tracking
                    setInterval(updateMarketPrice, 3000); // Update every 3s
                } else { alert("ACCESS DENIED"); }
            });
        }

        async function updateMarketPrice() {
            let pair = document.getElementById('pair').value;
            let symbol = "BTCUSDT";
            if(pair === "ETHEREUM") symbol = "ETHUSDT";
            if(pair === "GOLD") symbol = "PAXGUSDT";
            
            let badge = document.getElementById('livePriceBadge');
            
            if(!pair.includes("OTC")) {
                try {
                    let res = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${symbol}`);
                    let data = await res.json();
                    badge.innerText = `LIVE PRICE: $${parseFloat(data.price).toFixed(2)}`;
                    badge.style.color = "var(--buy-color)";
                } catch(e) { badge.innerText = "LIVE PRICE: API OFFLINE"; }
            } else {
                // OTC Simulation Price
                let simulatedPrice = (1.0845 + (Math.random() * 0.0010)).toFixed(5);
                badge.innerText = `OTC PRICE: ${simulatedPrice}`;
                badge.style.color = "var(--accent)";
            }
        }

        function generateSignal(pair) {
            const now = new Date();
            const timeSeed = now.getMinutes() + now.getHours();
            const pairSeed = pair.length;
            const score = ((Math.sin(timeSeed + pairSeed) + 1) / 2) * 100;
            
            const isBuy = score >= 50; 
            const mainColor = isBuy ? "#10b981" : "#ef4444";
            
            return {
                action: isBuy ? "HFT BUY 🟢" : "HFT SELL 🔴",
                mainColor: mainColor,
                winProb: (89 + (score % 6)).toFixed(1) + "%",
                msg: pair.includes("OTC") ? "OTC SYNCED MOMENTUM" : "REAL-TIME API DATA ANALYZED"
            };
        }

        function startAutoLoop() {
            clearInterval(countdownInterval);
            document.getElementById('ribbonScan').style.display = 'block';
            document.getElementById('ribbonTimer').style.display = 'none';
            document.getElementById('timerText').innerText = "SCAN";
            document.getElementById('scanBtn').style.display = "none";

            setTimeout(() => {
                let pair = document.getElementById('pair').value;
                let data = generateSignal(pair);
                
                document.getElementById('signalOutput').style.display = 'block';
                document.getElementById('sigAction').innerText = data.action;
                document.getElementById('sigAction').style.color = data.mainColor;
                document.getElementById('winProb').innerText = data.winProb;
                document.getElementById('sigMsg').innerText = data.msg;
                document.getElementById('signalOutput').style.borderColor = data.mainColor;

                let strats = ["Volume Delta", "RSI Micro", "Price Action", "Order Block"];
                document.getElementById('topStrats').innerHTML = strats.map(s => `
                    <div class="strat-item" style="border-left-color:${data.mainColor}">
                        <span class="strat-name">${s}</span>
                        <span class="strat-val" style="color:${data.mainColor}">${data.action.split(' ')[1]}</span>
                    </div>
                `).join('');

                startTradeTimer(data.mainColor);
            }, 2000);
        }

        function startTradeTimer(mainColor) {
            document.getElementById('ribbonScan').style.display = 'none';
            document.getElementById('ribbonTimer').style.display = 'block';
            let timeLeft = parseInt(document.getElementById('timeframe').value);
            let total = timeLeft;

            countdownInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timerText').innerText = timeLeft + "s";
                document.getElementById('ribbonTimer').style.width = (timeLeft/total)*100 + "%";
                document.getElementById('ribbonTimer').style.background = mainColor;

                if(timeLeft <= 0) {
                    clearInterval(countdownInterval);
                    document.getElementById('scanBtn').style.display = "block";
                    document.getElementById('timerText').innerText = "00:00";
                }
            }, 1000);
        }
    </script>
</body>
</html>
