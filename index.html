<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AB.SHAH | PREMIUM QUANT AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=JetBrains+Mono:wght@400;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* ALL ORIGINAL STYLES & UI RESTORED */
        :root {
            --bg-main: #050505; --bg-card: #0e1117; --border-color: #21262d; --text-primary: #ffffff;
            --text-muted: #8b949e; --buy-color: #00e676; --sell-color: #ff1744; --warn-color: #ffb300;
            --accent: #2962ff; --circle-bg: #161b22;
        }
        [data-theme="light"] {
            --bg-main: #f0f2f5; --bg-card: #ffffff; --border-color: #d0d7de; --text-primary: #24292f;
            --text-muted: #57606a; --buy-color: #059669; --sell-color: #e11d48; --warn-color: #d97706;
            --accent: #0969da; --circle-bg: #f6f8fa;
        }
        * { box-sizing: border-box; }
        body { background: var(--bg-main); color: var(--text-primary); font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 15px; transition: 0.3s; }
        .app-container { background: var(--bg-card); border: 1px solid var(--border-color); padding: 25px; border-radius: 24px; width: 100%; max-width: 440px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); overflow: hidden; display: flex; flex-direction: column; }
        
        .utility-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .util-selects { display: flex; gap: 8px; flex-wrap: wrap; }
        .u-sel { background: var(--circle-bg); border: 1px solid var(--border-color); color: var(--text-muted); border-radius: 6px; padding: 6px 10px; font-size: 11px; font-family: 'JetBrains Mono'; font-weight: 700; outline: none; cursor: pointer; }
        .theme-btn { background: var(--circle-bg); border: 1px solid var(--border-color); color: var(--text-muted); border-radius: 6px; padding: 6px 12px; cursor: pointer; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px;}
        .ping-badge { font-family: 'JetBrains Mono'; font-size: 11px; color: var(--buy-color); background: rgba(0, 230, 118, 0.1); padding: 5px 10px; border-radius: 6px; border: 1px solid rgba(0, 230, 118, 0.2); font-weight: 800; }
        
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 25px; }
        select.main-sel { background: var(--circle-bg); border: 1px solid var(--border-color); color: var(--text-primary); padding: 14px; border-radius: 10px; font-family: 'JetBrains Mono'; font-size: 12px; font-weight: 700; outline: none; }
        
        .indicator-wrapper { display: flex; flex-direction: column; align-items: center; justify-content: center; margin-bottom: 30px; min-height: 220px;}
        .status-text { font-family: 'JetBrains Mono'; font-size: 12px; font-weight: 800; color: var(--text-muted); margin-bottom: 20px; text-transform: uppercase; text-align: center; height: 16px;}
        .circle-outer { width: 180px; height: 180px; border-radius: 50%; display: flex; justify-content: center; align-items: center; position: relative; transition: 0.4s; background: var(--circle-bg); border: 2px solid var(--border-color); }
        .circle-inner { width: 155px; height: 155px; border-radius: 50%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: var(--bg-card); z-index: 2; }
        
        .signal-icon { width: 45px; height: 45px; margin-bottom: 8px; display: none; }
        .signal-text { font-size: 18px; font-weight: 900; letter-spacing: 1px; display: none; text-align: center; }
        .scanner-ring { position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 4px solid transparent; border-top-color: var(--accent); border-right-color: var(--accent); animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .metrics-container { margin-bottom: 25px; display: none; }
        .metric-row { margin-bottom: 14px; }
        .metric-labels { display: flex; justify-content: space-between; font-family: 'JetBrains Mono'; font-size: 11px; font-weight: 800; margin-bottom: 6px; }
        .progress-bg { width: 100%; height: 10px; background: var(--circle-bg); border-radius: 5px; overflow: hidden; border: 1px solid var(--border-color); }
        .progress-fill { height: 100%; width: 0%; border-radius: 5px; transition: 1s ease-in-out; }
        
        .timer-box { background: var(--circle-bg); border: 1px solid var(--border-color); border-radius: 14px; padding: 20px; text-align: center; margin-bottom: 15px;}
        .timer-val { font-family: 'JetBrains Mono'; font-size: 32px; font-weight: 900; }
        
        .tester-btn { width: 100%; padding: 12px; background: transparent; color: var(--text-muted); border: 1px dashed var(--border-color); border-radius: 8px; font-weight: 700; font-size: 11px; cursor: pointer; margin-bottom: 15px; font-family: 'JetBrains Mono'; transition: 0.3s;}
        .tester-btn:hover { border-color: var(--text-primary); color: var(--text-primary); }
        
        .auth-screen { text-align: center; padding: 20px 10px; }
        .auth-inp { width: 100%; padding: 16px; background: var(--circle-bg); border: 1px solid var(--border-color); color: var(--text-primary); border-radius: 12px; margin-bottom: 20px; outline: none; font-family: 'JetBrains Mono';}
        .primary-btn { width: 100%; padding: 18px; background: var(--accent); color: #fff; border: none; border-radius: 12px; font-weight: 900; cursor: pointer; transition: 0.3s; }
        .primary-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .security-alert { display: none; background: rgba(255, 23, 68, 0.1); border: 1px solid var(--sell-color); color: var(--sell-color); padding: 15px; border-radius: 10px; margin-top: 20px; font-size: 12px; font-weight: 700; }
        
        .copyright { text-align: center; margin-top: auto; font-size: 10px; color: var(--text-muted); font-family: 'JetBrains Mono'; padding-top: 15px; border-top: 1px solid var(--border-color); }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="utility-bar">
            <div class="util-selects">
                <select class="u-sel" id="langSel">
                    <option value="EN">EN (English)</option><option value="AR">AR (Arabic)</option>
                    <option value="PT">PT (Portuguese)</option><option value="ES">ES (Spanish)</option>
                    <option value="RU">RU (Russian)</option><option value="ID">ID (Indonesian)</option>
                    <option value="UR">UR (Urdu)</option><option value="HI">HI (Hindi)</option>
                    <option value="VI">VI (Vietnamese)</option><option value="TH">TH (Thai)</option>
                    <option value="TR">TR (Turkish)</option><option value="FR">FR (French)</option>
                    <option value="DE">DE (German)</option><option value="IT">IT (Italian)</option>
                    <option value="ZH">ZH (Chinese)</option><option value="JA">JA (Japanese)</option>
                    <option value="KO">KO (Korean)</option><option value="MS">MS (Malay)</option>
                    <option value="PL">PL (Polish)</option><option value="RO">RO (Romanian)</option>
                </select>
                <select class="u-sel" id="serverSel" onchange="changeServer()">
                    <option value="GLOBAL">AUTO NODE</option><option value="US">SERVER: US</option>
                    <option value="UK">SERVER: UK</option><option value="BR">SERVER: BR</option>
                    <option value="SG">SERVER: SG</option>
                </select>
            </div>
            <button class="theme-btn" onclick="toggleTheme()" id="themeBtn">☀️</button>
        </div>

        <div class="auth-screen" id="loginBox">
            <h1 style="font-size: 32px; font-weight: 900;">AB.SHAH</h1>
            <p style="color: var(--text-muted); font-size: 12px; margin-bottom: 30px;">HFT QUANTUM ENGINE v9.0</p>
            <input type="email" id="email" class="auth-inp" placeholder="Enter Secure License Key">
            <button class="primary-btn" id="loginBtn" onclick="login()">INITIALIZE SYSTEM</button>
            <div class="security-alert" id="secAlert"></div>
        </div>

        <div id="dashboard" style="display: none;">
            <div class="header">
                <div style="font-size: 24px; font-weight: 900;">AB.SHAH</div>
                <div class="ping-badge" id="pingBadge">PING: 3ms</div>
            </div>
            
            <div class="controls">
                <select id="pair" class="main-sel" onchange="startAutoLoop()">
                    <optgroup label="OTC Pairs">
                        <option value="EUR/USD (OTC)">EUR/USD (OTC)</option>
                        <option value="GBP/USD (OTC)">GBP/USD (OTC)</option>
                        <option value="USD/JPY (OTC)">USD/JPY (OTC)</option>
                        <option value="GOLD (OTC)">GOLD (OTC)</option>
                        <option value="BITCOIN (OTC)">BITCOIN (OTC)</option>
                        <option value="ETHEREUM (OTC)">ETHEREUM (OTC)</option>
                    </optgroup>
                    <optgroup label="Real Markets">
                        <option value="BITCOIN (REAL)">BITCOIN (REAL)</option>
                        <option value="ETHEREUM (REAL)">ETHEREUM (REAL)</option>
                        <option value="GOLD (PAXG)">GOLD (REAL)</option>
                    </optgroup>
                </select>
                <select id="timeframe" class="main-sel" onchange="startAutoLoop()">
                    <option value="5">5 SECONDS</option>
                    <option value="15">15 SECONDS</option>
                    <option value="30">30 SECONDS</option>
                    <option value="60" selected>60 SECONDS (1 MIN)</option>
                </select>
            </div>
            
            <div class="indicator-wrapper">
                <div class="status-text" id="statusText">WAITING FOR ENGINE...</div>
                <div class="circle-outer" id="circleOuter">
                    <div class="scanner-ring" id="scannerRing"></div>
                    <div class="circle-inner" id="circleInner">
                        <svg class="signal-icon" id="sigIconBuy" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></svg>
                        <svg class="signal-icon" id="sigIconSell" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"></polyline><polyline points="17 18 23 18 23 12"></polyline></svg>
                        <div class="signal-text" id="sigText">--</div>
                    </div>
                </div>
            </div>
            
            <div class="metrics-container" id="metricsBox">
                <div class="metric-row"><div class="metric-labels"><span>TOTAL STRENGTH</span><span id="strengthVal">0%</span></div>
                <div class="progress-bg"><div class="progress-fill" id="strengthFill"></div></div></div>
                <div class="metric-row"><div class="metric-labels"><span>PROBABILITY</span><span id="probVal">0%</span></div>
                <div class="progress-bg"><div class="progress-fill" id="probFill"></div></div></div>
            </div>
            
            <div class="timer-box">
                <div style="font-size: 10px; color: var(--text-muted); font-weight: 800; margin-bottom: 5px;">NEXT SCAN IN</div>
                <div class="timer-val" id="timerText">00:00</div>
            </div>

            <button class="tester-btn" onclick="alert('Running 7-Day Algorithmic Simulation...')">[ RUN 7-DAY ALGORITHMIC REPORT ]</button>
            
            <div class="copyright">&copy; 2026 AB.SHAH. All Rights Reserved.</div>
        </div>
    </div>

    <script>
        // --- DEVICE FINGERPRINT (Hardware ID) ---
        let deviceID = localStorage.getItem("abshah_vid");
        if (!deviceID) {
            deviceID = "DEV-" + Math.random().toString(36).substring(2, 12).toUpperCase();
            localStorage.setItem("abshah_vid", deviceID);
        }

        // ==========================================
        // YAHAN APNA GOOGLE SCRIPT URL PASTE KAREIN
        // ==========================================
        const GOOGLE_APP_URL = "YOUR_GOOGLE_SCRIPT_URL_HERE";

        async function login() {
            let email = document.getElementById('email').value.trim().toLowerCase();
            let alertBox = document.getElementById('secAlert');
            let btn = document.getElementById('loginBtn');
            
            if (email.length < 5) {
                alertBox.style.display = "block";
                alertBox.innerText = "Please enter a valid License Key.";
                return;
            }

            // Show loading state
            btn.innerText = "VERIFYING LICENSE...";
            btn.disabled = true;
            alertBox.style.display = "none";

            try {
                // GOOGLE SHEETS CROSS-DEVICE SECURITY CALL
                let response = await fetch(`${GOOGLE_APP_URL}?email=${encodeURIComponent(email)}&deviceId=${encodeURIComponent(deviceID)}`);
                let data = await response.json();

                if (data.success) {
                    // Approved
                    document.getElementById('loginBox').style.display = 'none';
                    document.getElementById('dashboard').style.display = 'block';
                    startAutoLoop();
                } else {
                    // Blocked (Not in sheet OR wrong device)
                    alertBox.style.display = "block";
                    alertBox.innerText = data.msg;
                }
            } catch (error) {
                alertBox.style.display = "block";
                alertBox.innerText = "DATABASE CONNECTION ERROR. Please contact Admin.";
            } finally {
                btn.innerText = "INITIALIZE SYSTEM";
                btn.disabled = false;
            }
        }

        // --- HFT LOGIC & UI (Full logic restored) ---
        let countdownInterval, scanTimeout;
        function startAutoLoop() {
            clearInterval(countdownInterval); clearTimeout(scanTimeout);
            document.getElementById('statusText').innerText = "ANALYZING MARKET...";
            document.getElementById('statusText').style.color = "var(--text-muted)";
            document.getElementById('scannerRing').style.display = "block";
            document.getElementById('sigIconBuy').style.display = "none";
            document.getElementById('sigIconSell').style.display = "none";
            document.getElementById('sigText').style.display = "none";
            document.getElementById('metricsBox').style.display = "none";
            document.getElementById('circleOuter').style.borderColor = "var(--border-color)";
            document.getElementById('circleOuter').style.boxShadow = "none";
            document.getElementById('timerText').innerText = "--:--";

            scanTimeout = setTimeout(async () => {
                const isBuy = Math.random() > 0.5;
                const color = isBuy ? "var(--buy-color)" : "var(--sell-color)";
                
                document.getElementById('statusText').innerText = isBuy ? "TREND UPTICK CONFIRMED" : "TREND DOWNTICK CONFIRMED";
                document.getElementById('statusText').style.color = color;
                document.getElementById('scannerRing').style.display = "none";
                document.getElementById('circleOuter').style.borderColor = color;
                document.getElementById('circleOuter').style.boxShadow = `0 0 40px ${color}50`;
                
                let iconEl = document.getElementById(isBuy ? 'sigIconBuy' : 'sigIconSell');
                iconEl.style.display = "block"; iconEl.style.color = color;
                
                document.getElementById('sigText').innerText = isBuy ? "BUY\n(LONG)" : "SELL\n(SHORT)";
                document.getElementById('sigText').style.display = "block";
                document.getElementById('sigText').style.color = color;

                document.getElementById('metricsBox').style.display = "block";
                const sVal = (88 + Math.random() * 8).toFixed(1);
                const pVal = (75 + Math.random() * 10).toFixed(1);
                document.getElementById('strengthVal').innerText = sVal + "%";
                document.getElementById('probVal').innerText = pVal + "%";
                document.getElementById('strengthVal').style.color = color;
                document.getElementById('probVal').style.color = color;
                
                setTimeout(() => {
                    let sFill = document.getElementById('strengthFill');
                    sFill.style.width = sVal + "%";
                    sFill.style.background = isBuy ? "linear-gradient(90deg, #00b09b, #96c93d)" : "linear-gradient(90deg, #cb2d3e, #ef473a)";
                    
                    let pFill = document.getElementById('probFill');
                    pFill.style.width = pVal + "%";
                    pFill.style.background = isBuy ? "linear-gradient(90deg, #00b09b, #96c93d)" : "linear-gradient(90deg, #cb2d3e, #ef473a)";
                }, 50);

                startTimer(color);
            }, 1800);
        }

        function startTimer(color) {
            let left = parseInt(document.getElementById('timeframe').value);
            document.getElementById('timerText').style.color = color;
            countdownInterval = setInterval(() => {
                left--;
                let m = Math.floor(left / 60).toString().padStart(2, '0');
                let s = (left % 60).toString().padStart(2, '0');
                document.getElementById('timerText').innerText = `${m}:${s}`;
                if(left <= 0) { clearInterval(countdownInterval); startAutoLoop(); }
            }, 1000);
        }

        function toggleTheme() { document.body.dataset.theme = document.body.getAttribute('data-theme') === 'light' ? '' : 'light'; }
        function changeServer() { 
            let badge = document.getElementById('pingBadge');
            badge.style.color = "var(--warn-color)"; badge.innerText = "ROUTING...";
            setTimeout(() => { badge.innerText = `PING: ${Math.floor(Math.random() * 40 + 5)}ms`; badge.style.color = "var(--buy-color)"; }, 600);
        }
    </script>
</body>
</html>
