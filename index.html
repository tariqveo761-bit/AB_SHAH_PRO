<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AB.SHAH PRO | PREDATOR HFT</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #020408;
            --bg-card: #0b1018;
            --border-color: #1e293b;
            --text-primary: #f8fafc;
            --text-muted: #94a3b8;
            --buy-color: #00ff88;
            --sell-color: #ff3366;
            --warn-color: #fbbf24;
            --accent: #38bdf8;
            --shadow: 0 0 30px rgba(0,0,0,0.8);
            --input-bg: #020408;
        }

        [data-theme="light"] {
            --bg-main: #f1f5f9;
            --bg-card: #ffffff;
            --border-color: #cbd5e1;
            --text-primary: #0f172a;
            --text-muted: #64748b;
            --buy-color: #059669;
            --sell-color: #e11d48;
            --warn-color: #d97706;
            --accent: #0284c7;
            --shadow: 0 10px 30px rgba(0,0,0,0.05);
            --input-bg: #f8fafc;
        }

        body { background: var(--bg-main); color: var(--text-primary); font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; transition: 0.4s; overflow-x: hidden; }
        
        .terminal-box { background: var(--bg-card); border: 2px solid var(--border-color); padding: 40px; border-radius: 24px; width: 540px; box-shadow: var(--shadow); position: relative; transition: 0.4s; }
        
        .theme-toggle { position: absolute; top: 25px; right: 25px; background: var(--input-bg); border: 1px solid var(--border-color); color: var(--text-muted); border-radius: 50%; width: 42px; height: 42px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s; }

        .taveed-container { position: relative; width: 100%; height: 130px; border-radius: 16px; overflow: hidden; margin-bottom: 30px; border: 1px solid var(--border-color); display: none; background: #000; }
        .taveed-img { width: 100%; height: 100%; object-fit: cover; opacity: 0.5; filter: contrast(1.2); }
        .taveed-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-family: 'JetBrains Mono', monospace; font-size: 32px; font-weight: 900; color: #fff; text-shadow: 0 0 30px var(--accent); letter-spacing: 8px; width: 100%; text-align: center; }
        
        .header-area { text-align: center; margin-bottom: 30px; }
        h1 { margin: 0; font-size: 28px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; }
        .badge { background: rgba(56, 189, 248, 0.1); color: var(--accent); padding: 6px 14px; border-radius: 8px; font-size: 11px; font-family: 'JetBrains Mono'; border: 1px solid rgba(56, 189, 248, 0.2); font-weight: 800; margin-top: 10px; display: inline-block; }
        
        .pulse-badge { background: var(--input-bg); color: var(--accent); padding: 12px; border-radius: 12px; font-size: 14px; font-family: 'JetBrains Mono'; border: 1px solid var(--border-color); display: block; font-weight: 900; margin-top: 20px; text-align: center; box-shadow: inset 0 0 10px rgba(0,0,0,0.2); }
        
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        select { padding: 15px; background: var(--input-bg); border: 1px solid var(--border-color); color: var(--text-primary); border-radius: 12px; font-family: 'JetBrains Mono'; font-weight: 700; outline: none; cursor: pointer; }
        
        .primary-btn { width: 100%; padding: 18px; background: var(--accent); color: #fff; border: none; border-radius: 12px; font-weight: 900; font-size: 16px; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; }
        .primary-btn:hover { filter: brightness(1.2); transform: scale(1.02); }

        .timer-display { font-family: 'JetBrains Mono', monospace; font-size: 64px; font-weight: 900; text-align: center; margin: 15px 0; color: var(--text-primary); }
        
        .ribbon-container { width: 100%; height: 10px; background: var(--input-bg); border-radius: 5px; overflow: hidden; margin-bottom: 30px; border: 1px solid var(--border-color); }
        .ribbon-scan { width: 40%; height: 100%; background: var(--accent); position: relative; animation: scanHFT 0.6s linear infinite alternate; display: none; }
        @keyframes scanHFT { 0% { left: -20%; } 100% { left: 80%; } }
        .ribbon-timer { height: 100%; width: 100%; background: var(--accent); transition: width 1s linear; display: none; }

        .signal-box { background: var(--input-bg); border: 2px solid var(--border-color); padding: 30px; border-radius: 20px; text-align: center; display: none; position: relative; }
        .action { font-size: 34px; font-weight: 900; margin-bottom: 20px; text-transform: uppercase; }
        
        .metrics { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .m-item { background: var(--bg-card); padding: 10px; border-radius: 8px; border: 1px solid var(--border-color); font-size: 11px; font-family: 'JetBrains Mono'; font-weight: 800; }

        .top-strats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .strat { display: flex; justify-content: space-between; background: var(--bg-card); padding: 14px; border-radius: 10px; border-left: 5px solid var(--accent); font-size: 11px; font-weight: 700; }
        
        #loginBox input { width: 100%; padding: 15px; margin-bottom: 15px; background: var(--input-bg); border: 1px solid var(--border-color); color: #fff; border-radius: 12px; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="loginBox" class="terminal-box">
        <div class="header-area">
            <h1>PREDATOR HFT v4.0</h1>
            <div class="badge">SYSTEM READY: STANDBY</div>
        </div>
        <input type="email" id="email" placeholder="Enter Secure Authentication Key">
        <button class="primary-btn" onclick="login()">WAKE THE BEAST</button>
    </div>

    <div id="dashboard" class="terminal-box" style="display: none;">
        <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">☀️</button>
        
        <div class="taveed-container" id="taveedContainer">
            <img class="taveed-img" src="https://images.unsplash.com/photo-1611974789855-9c2a0a7236a3?auto=format&fit=crop&w=800&q=80">
            <div class="taveed-text">AB.SHAH HFT</div>
        </div>

        <div class="header-area">
            <div class="badge">ENGINE: BEAST MODE | SYNC: 1ms</div>
            <div class="pulse-badge" id="mPulse">⚡ AGGRESSION LEVEL: OPTIMIZING...</div>
        </div>

        <button class="tester-btn" onclick="runBacktest()" style="width:100%; padding:10px; background:none; border:1px dashed var(--border-color); color:var(--text-muted); cursor:pointer; margin-bottom:15px; border-radius:8px;">[ GENERATE MASTER REPORT ]</button>
        
        <div id="testerPanel" style="display:none; background:var(--input-bg); padding:15px; border-radius:12px; margin-bottom:20px; border:1px solid var(--accent);">
            <div style="font-size:10px; font-weight:900; color:var(--accent); text-align:center;">PREDATOR 30-DAY STATS</div>
            <div style="display:flex; justify-content:space-between; margin-top:10px; font-family:'JetBrains Mono'; font-size:12px;">
                <span>TRADES: <b id="tTotal">--</b></span>
                <span>WINS: <b id="tWins" style="color:var(--buy-color)">--</b></span>
                <span>WIN RATE: <b style="color:var(--buy-color)">96.4%</b></span>
            </div>
        </div>

        <div class="controls">
            <select id="pair" onchange="startAutoLoop()">
                <option value="BITCOIN (OTC)">BITCOIN (OTC)</option>
                <option value="GOLD (OTC)">GOLD (OTC)</option>
                <option value="EUR/USD (OTC)">EUR/USD (OTC)</option>
                <option value="BITCOIN (REAL)">BITCOIN (REAL)</option>
            </select>
            <select id="timeframe" onchange="startAutoLoop()">
                <option value="5">5 SECONDS</option>
                <option value="15">15 SECONDS</option>
                <option value="60" selected>1 MINUTE</option>
                <option value="300">5 MINUTES</option>
            </select>
        </div>

        <div class="timer-display" id="timerText">00:00</div>
        <div class="ribbon-container">
            <div id="ribbonScan" class="ribbon-scan"></div>
            <div id="ribbonTimer" class="ribbon-timer"></div>
        </div>

        <div id="signalOutput" class="signal-box">
            <div class="sys-msg" id="sigMsg">SCANNING LIQUIDITY...</div>
            <div class="action" id="sigAction">--</div>
            
            <div class="metrics">
                <div class="m-item">ACC: <span id="mAcc">--</span></div>
                <div class="m-item">POWER: <span id="mPow">--</span></div>
                <div class="m-item">SPEED: <span id="mSpd">--</span></div>
            </div>

            <div class="top-strats" id="topStrats"></div>
        </div>
    </div>

    <script>
        const SERVER_URL = window.location.origin;
        let countdownInterval, pulseInterval, scanTimeout;

        function toggleTheme() {
            const body = document.body;
            const btn = document.getElementById('themeBtn');
            if(body.getAttribute('data-theme') === 'light') {
                body.removeAttribute('data-theme');
                btn.innerText = '☀️';
            } else {
                body.setAttribute('data-theme', 'light');
                btn.innerText = '🌙';
            }
        }

        function login() {
            let email = document.getElementById('email').value;
            fetch(`${SERVER_URL}/login`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email: email })
            }).then(res => res.json()).then(data => {
                if(data.success) {
                    document.getElementById('loginBox').style.display = 'none';
                    document.getElementById('dashboard').style.display = 'block';
                    document.getElementById('taveedContainer').style.display = 'block';
                    pulseInterval = setInterval(updatePulse, 1000);
                    startAutoLoop();
                } else { alert("ACCESS DENIED"); }
            });
        }

        function runBacktest() {
            document.getElementById('testerPanel').style.display = 'block';
            const total = 28450 + Math.floor(Math.random() * 1000);
            document.getElementById('tTotal').innerText = total;
            document.getElementById('tWins').innerText = Math.floor(total * 0.964);
        }

        function updatePulse() {
            const levels = ["HIGH", "EXTREME", "AGGRESSIVE", "VOLATILE"];
            const lvl = levels[Math.floor(Math.random() * levels.length)];
            document.getElementById('mPulse').innerText = `⚡ AGGRESSION LEVEL: ${lvl} (${(90 + Math.random()*9).toFixed(1)}%)`;
        }

        // --- THE BEAST ENGINE (NO WAITING, FULL ATTACK) ---
        async function getBeastSignal(pair) {
            const now = new Date();
            const seed = now.getSeconds() + now.getMinutes() + pair.length;
            const score = ((Math.sin(seed) + 1) / 2) * 100;
            
            // Minimal Waiting Zone (Only if market is absolutely dead)
            if (score > 48 && score < 52) {
                return { action: "WAITING...", color: "var(--text-muted)", msg: "STABILIZING FLOW", pow: "LOW" };
            }

            const isBuy = score >= 50;
            const mainColor = isBuy ? "var(--buy-color)" : "var(--sell-color)";
            
            return {
                action: isBuy ? "PREDATOR BUY 🟢" : "PREDATOR SELL 🔴",
                color: mainColor,
                msg: "MOMENTUM CAPTURED - STRIKE",
                acc: (94 + Math.random() * 5).toFixed(1) + "%",
                pow: (85 + Math.random() * 14).toFixed(0) + "%",
                spd: "ULTRA-FAST"
            };
        }

        function startAutoLoop() {
            clearInterval(countdownInterval);
            clearTimeout(scanTimeout);

            document.getElementById('ribbonScan').style.display = 'block';
            document.getElementById('ribbonTimer').style.display = 'none';
            document.getElementById('timerText').innerText = "SCAN";
            document.getElementById('timerText').style.color = "var(--text-muted)";
            document.getElementById('signalOutput').style.display = 'block';
            document.getElementById('sigAction').innerText = "HUNTING...";
            document.getElementById('sigAction').style.color = "var(--text-primary)";

            scanTimeout = setTimeout(async () => {
                const pair = document.getElementById('pair').value;
                const data = await getBeastSignal(pair);
                
                document.getElementById('sigMsg').innerText = data.msg;
                document.getElementById('sigAction').innerText = data.action;
                document.getElementById('sigAction').style.color = data.color;
                document.getElementById('mAcc').innerText = data.acc || "95.4%";
                document.getElementById('mPow').innerText = data.pow || "92%";
                document.getElementById('mSpd').innerText = data.spd || "HFT";
                document.getElementById('signalOutput').style.borderColor = data.color;

                const strats = ["Price Action", "Vol Delta", "Smart Money", "Trend Pulse"];
                document.getElementById('topStrats').innerHTML = strats.map(s => `
                    <div class="strat" style="border-left-color:${data.color}">
                        <span>${s}</span><span style="color:${data.color}">${data.action.split(' ')[1]}</span>
                    </div>
                `).join('');

                startTradeTimer(data.color);
            }, 1500); // Super fast 1.5s scan
        }

        function startTradeTimer(color) {
            document.getElementById('ribbonScan').style.display = 'none';
            document.getElementById('ribbonTimer').style.display = 'block';
            document.getElementById('ribbonTimer').style.background = color;
            document.getElementById('timerText').style.color = color;

            let total = parseInt(document.getElementById('timeframe').value);
            let left = total;

            countdownInterval = setInterval(() => {
                left--;
                let m = Math.floor(left / 60).toString().padStart(2, '0');
                let s = (left % 60).toString().padStart(2, '0');
                document.getElementById('timerText').innerText = `${m}:${s}`;
                document.getElementById('ribbonTimer').style.width = (left / total) * 100 + "%";

                if (left <= 0) {
                    clearInterval(countdownInterval);
                    startAutoLoop();
                }
            }, 1000);
        }
    </script>
</body>
</html>
